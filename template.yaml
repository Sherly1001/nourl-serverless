AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Parameters:
  IsProd:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  CorsOrigin:
    Type: String
    Default: "https://nourl.space"
  NotFoundFallbackUrl:
    Type: String
    Default: ""
  MongoUrlSsmPath:
    Type: String
    Default: "/nourl/mongo-url"

Conditions:
  IsProdCondition: !Equals [!Ref IsProd, "true"]

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs22.x

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default

  NoUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: dist/lambda.handler
      Environment:
        Variables:
          MONGO_URL: !Sub "{{resolve:ssm:${MongoUrlSsmPath}}}"
          NOTFOUND_FALLBACK_URL: !Ref NotFoundFallbackUrl
          CORS_ORIGIN: !Ref CorsOrigin
      Events:
        RootGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: GET
        ProxyAny:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: IsProdCondition
    Properties:
      DomainName: nourl.space
      ValidationMethod: DNS

  ApiGatewayDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: IsProdCondition
    Properties:
      DomainName: nourl.space
      DomainNameConfigurations:
        - CertificateArn: !Ref Certificate
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: IsProdCondition
    DependsOn: HttpApiApiGatewayDefaultStage
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiGatewayDomainName
      Stage: $default

Outputs:
  ApiGatewayDomainTarget:
    Condition: IsProdCondition
    Description: Add as Cloudflare CNAME target for nourl.space (orange cloud)
    Value: !GetAtt ApiGatewayDomainName.RegionalDomainName
